version: "3.8"
services:
  logger:
    image: james7132/hourai:logger
    container_name: logger
    restart: unless-stopped
    expose:
      - 8080
      - 9090
    environment:
      - HOURAI_CONFIG=/opt/hourai.jsonnet
      - HOURAI_ENV=prod
    volumes:
      - ./hourai.jsonnet:/opt/hourai.jsonnet:ro
      - ./lists/:/opt/lists:ro
    depends_on:
      - postgres
      - redis
  nginx:
    image: james7132/hourai:latest-frontend
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf
      - ./nginx:/etc/nginx/common
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - logger
  postgres:
    image: postgres:12-alpine
    container_name: postgres
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hourai
      - POSTGRES_USER=hourai
      - POSTGRES_PASSWORD=ddDa
  redis:
    image: redis:6.0-alpine
    container_name: redis
    command: ["redis-server",
              "--appendonly", "yes",
              "--save", "900", "1",
              "--save", "300", "10",
              "--save", "60", "10000"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
  grafana:
    image: grafana/grafana:master
    restart: unless-stopped
    container_name: grafana
    volumes:
      - ./grafana.ini:/etc/grafana/grafana.ini
      - grafana-data:/var/lib/grafana
    expose:
      - 3000
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
volumes:
  db-data:
    name: "db-data"
  redis-data:
    name: "redis-data"
  grafana-data:
    name: "grafana-data"
  prometheus-data:
    name: prometheus-data-prod
networks:
  default:
    name: "hourai"
