name: Docker Build
on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types:
      - completed
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build (logger)
        uses: docker/build-push-action@v2
        with:
          push: true
          context: .
          file: crates/hourai-logger/Dockerfile
          tags: james7132/hourai:latest,james7132/hourai:latest-logger
      - name: Build (frontend)
        uses: docker/build-push-action@v2
        with:
          push: true
          context: .
          file: frontend/Dockerfile
          tags: james7132/hourai:latest-frontend
